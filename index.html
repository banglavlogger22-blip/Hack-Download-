<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background-color: #f4f4f4;
        }
        h1 {
            color: #333;
        }
        .download-button {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 30px;
            font-size: 18px;
            color: #fff;
            background-color: #007bff;
            text-decoration: none;
            border-radius: 5px;
        }
        .download-button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <!-- Adsterra Social Bar Code (Place it here) -->
    <div id="adsterra-social-bar">
        <!-- Example Adsterra Code -->
        <script async src="https://your-adsterra-code.com"></script>
    </div>

    <h1>Download Your File</h1>
    <p>Click the button below to download your file.</p>
    <a class="download-button" href="YOUR_FILE_URL" download>Download Now</a>

    <!-- Optional: Adsterra Direct Link Code before the file download if needed -->
    <div id="adsterra-direct-link">
        <!-- Example Direct Link Code -->
        <script async src="https://your-direct-link-ad.com"></script>
    </div>
</body>
</html>
